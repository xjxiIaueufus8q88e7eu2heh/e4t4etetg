name: macOS Remote Desktop

on:
  workflow_dispatch: # Allows you to trigger this manually

jobs:
  remote-access:
    runs-on: macos-latest
    steps:
      - name: Set up VNC and Password
        run: |
          # Configure a password for the runner user
          sudo dscl . -passwd /Users/runner "SecretPassword123"
          
          # Enable macOS Screen Sharing (VNC)
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist

      - name: Install and Configure Ngrok
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          # Install Ngrok via Homebrew
          brew install ngrok/ngrok/ngrok
          
          # Configure the authentication token
          ngrok config add-authtoken "$NGROK_TOKEN"

      - name: Start Reverse Tunnel
        run: |
          # Create a TCP tunnel pointing to the native VNC port 5900
          echo "Starting tunnel..."
          ngrok tcp 5900 --log=stdout &
          
          # Allow the background tunnel process time to establish a connection
          sleep 5
          
          # Extract and display the public connection URL from the local Ngrok API
          curl --silent http://127.0.0 | jq '.tunnels[0].public_url'
          
          # Keep the workflow active so the runner does not terminate instantly
          echo "Tunnel is live. Keep-alive loop running..."
          while true; do sleep 60; done
