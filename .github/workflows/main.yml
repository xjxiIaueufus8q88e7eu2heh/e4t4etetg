name: macOS VNC with zrok

on:
  workflow_dispatch:

jobs:
  remote-access:
    runs-on: macos-latest
    steps:
      - name: Setup VNC user and start tunnel
        run: |
          # 1. Enable Screen Sharing
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist

          # 2. Create local user 'vncuser'
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID 502
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "YourPassword123!"
          sudo createhomedir -c -u vncuser 2>/dev/null || true
          sudo dscl . -append /Groups/admin GroupMembership vncuser

          # 3. Grant remote management rights (VNC)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -allowAccessFor -specifiedUsers
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -users vncuser -access -on -privs -all

          # 4. Reset screen capture permissions (this is enough; no manual SQL needed)
          sudo tccutil reset ScreenCapture

          # 5. Auto‑login (requires reboot – see note below)
          sudo defaults write /Library/Preferences/com.apple.loginwindow autoLoginUser vncuser
          sudo security add-generic-password -a "vncuser" -w "YourPassword123!" \
            -s "com.apple.loginwindow" -T "/System/Library/CoreServices/Software Update.app" \
            -T "/System/Library/CoreServices/Setup Assistant.app" 2>/dev/null || true

          # 6. Install zrok and start the tunnel
          brew install zrok
          zrok enable ahHD9lCRm1Qj --headless
          nohup zrok share private --backend-mode tcpTunnel localhost:5900 --headless > /tmp/zrok.log 2>&1 &
          sleep 5
          echo "======================================"
          echo "Share token (use on Windows):"
          grep -oE '[a-f0-9]{16,}' /tmp/zrok.log | head -1
          echo "======================================"

          # Keep job alive
          tail -f /dev/null
