name: macOS Remote Desktop

on:
  workflow_dispatch: # Allows you to trigger this manually

jobs:
  remote-access:
    runs-on: macos-latest
    steps:
      - name: Set up VNC and Password
        run: |
          # Configure a password for the runner user
          sudo dscl . -passwd /Users/runner "SecretPassword123" 2>/dev/null || true
          
          # Enable macOS Screen Sharing (VNC)
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist

      - name: shit
        run: |
          brew install zrok
          sudo zrok version
