name: macOS VNC with zrok

on:
  workflow_dispatch:

jobs:
  remote-access:
    runs-on: macos-latest   # or macos-15 (Intel)
    steps:
      - name: Setup VNC user and permissions
        run: |
          # 1. Enable Screen Sharing
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist

          # 2. Create local user 'vncuser'
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser RealName "VNC User"
          sudo dscl . -create /Users/vncuser UniqueID 502
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          sudo dscl . -passwd /Users/vncuser "YourPassword123!"
          sudo createhomedir -c -u vncuser 2>/dev/null || true
          sudo dscl . -append /Groups/admin GroupMembership vncuser

          # 3. Grant Remote Management (VNC) rights to vncuser
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -allowAccessFor -specifiedUsers
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -users vncuser -access -on -privs -all

          # 4. Reset Screen Capture permissions and re-allow vncagent (robust TCC insertion)
          sudo tccutil reset ScreenCapture
          sleep 2
          # Dynamically build INSERT statement matching the actual number of columns
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          SERVICE="kTCCServiceScreenCapture"
          CLIENT="/System/Library/CoreServices/RemoteManagement/AppleVNCServer/vncagent"
          # Get column count
          COL_COUNT=$(sudo sqlite3 "$TCC_DB" "PRAGMA table_info(access);" | wc -l)
          # Generate placeholders (?,? ...) with COL_COUNT entries
          PLACEHOLDERS=$(printf '?%.0s,' $(seq 1 $COL_COUNT) | sed 's/,$//')
          # Insert with all columns set to NULL except the first 5
          sudo sqlite3 "$TCC_DB" <<EOF
          INSERT OR REPLACE INTO access VALUES($PLACEHOLDERS)
          SELECT '$SERVICE', '$CLIENT', 0, 1, 1, 1, NULL, NULL, NULL, NULL, NULL, NULL, NULL, NULL, NULL, NULL, NULL
          WHERE NOT EXISTS (SELECT 1 FROM access WHERE service='$SERVICE' AND client='$CLIENT');
          EOF

          # 5. Auto-login (requires reboot – see note)
          sudo defaults write /Library/Preferences/com.apple.loginwindow autoLoginUser vncuser
          sudo security add-generic-password -a "vncuser" -w "YourPassword123!" \
            -s "com.apple.loginwindow" -T "/System/Library/CoreServices/Software Update.app" \
            -T "/System/Library/CoreServices/Setup Assistant.app" 2>/dev/null || true

      - name: Install and run zrok tunnel
        run: |
          brew install zrok
          zrok enable ahHD9lCRm1Qj --headless
          nohup zrok share private --backend-mode tcpTunnel localhost:5900 --headless > /tmp/zrok.log 2>&1 &
          sleep 5
          echo "======================================"
          echo "Share token (use on Windows):"
          grep -oE '[a-f0-9]{16,}' /tmp/zrok.log | head -1
          echo "======================================"
          tail -f /dev/null
