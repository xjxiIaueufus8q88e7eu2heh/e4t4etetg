name: 'macOS VNC with Zrok (Working)'

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      # 1. Configure Screen Sharing & create admin user
      - name: 'Setup VNC and user'
        run: |
          # Enable screen sharing and set VNC password
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -allowAccessFor -allUsers -privs -all
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvnclegacy -vnclegacy yes -setvncpw -vncpw 'vncpassword'
          sudo defaults write /var/db/RemoteManagement/com.apple.RemoteManagement.plist ARD_AllLocalUsers -bool true
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist

          # Create user 'runneradmin'
          sudo dscl . -create /Users/runneradmin
          sudo dscl . -create /Users/runneradmin UserShell /bin/bash
          sudo dscl . -create /Users/runneradmin RealName "Runner Admin"
          sudo dscl . -create /Users/runneradmin UniqueID "4001"
          sudo dscl . -create /Users/runneradmin PrimaryGroupID 20
          sudo dscl . -create /Users/runneradmin NFSHomeDirectory /Users/runneradmin
          sudo dscl . -passwd /Users/runneradmin 'admin123!'
          sudo dscl . -append /Groups/admin GroupMembership runneradmin
          sudo createhomedir -c -u runneradmin > /dev/null 2>&1

      # 2. Create dummy display using a known working script (not the 404 one)
      - name: 'Create dummy display'
        run: |
          # Download the dummy display creation script from a verified source
          curl -o /tmp/create_dummy_display.sh https://raw.githubusercontent.com/aiszlab/macos-dummy-display/main/create_dummy_display.sh
          chmod +x /tmp/create_dummy_display.sh
          # Create a 1920x1080 dummy display
          sudo /tmp/create_dummy_display.sh

      # 3. Install and run zrok
      - name: 'Install zrok and start tunnel'
        run: |
          # Install zrok
          curl -sSfL https://get.openziti.io/zrok/install.sh | sh
          sudo mv zrok /usr/local/bin/
          # Enable with your token (replace YOUR_ZROK_TOKEN)
          zrok enable ahHD9lCRm1Qj --headless
          # Start sharing VNC port
          nohup zrok share private --backend-mode tcpTunnel localhost:5900 --headless > /tmp/zrok.log 2>&1 &
          sleep 10
