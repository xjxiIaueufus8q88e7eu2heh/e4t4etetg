name: 'macOS VNC with Zrok'

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 'Configure Screen Sharing & Create User'
        run: |
          # Enable Screen Sharing and set a VNC password
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -allowAccessFor -allUsers -privs -all
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvnclegacy -vnclegacy yes -setvncpw -vncpw 'vncpassword'
          sudo defaults write /var/db/RemoteManagement/com.apple.RemoteManagement.plist ARD_AllLocalUsers -bool true
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist

          # Create an admin user for VNC access
          sudo dscl . -create /Users/runneradmin
          sudo dscl . -create /Users/runneradmin UserShell /bin/bash
          sudo dscl . -create /Users/runneradmin RealName "Runner Admin"
          sudo dscl . -create /Users/runneradmin UniqueID "4001"
          sudo dscl . -create /Users/runneradmin PrimaryGroupID 20
          sudo dscl . -create /Users/runneradmin NFSHomeDirectory /Users/runneradmin
          sudo dscl . -passwd /Users/runneradmin 'admin123!'
          sudo dscl . -append /Groups/admin GroupMembership runneradmin
          sudo createhomedir -c -u runneradmin > /dev/null 2>&1

      - name: 'Install Homebrew and BetterDisplay'
        run: |
          # Install Homebrew if not already present
          if ! command -v brew &> /dev/null; then
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          brew update
          # Install BetterDisplay for dummy display creation
          brew install --cask betterdisplay

      - name: 'Create Dummy Display with BetterDisplay'
        run: |
          # Launch BetterDisplay and create a dummy display
          open -a BetterDisplay
          # Wait for BetterDisplay to initialize
          sleep 5
          # Use BetterDisplay's CLI to create a dummy display
          # Adjust the resolution as needed
          betterdisplaycli create dummy --width 1920 --height 1080 --name "GitHub Runner Dummy"

      - name: 'Install and Run Zrok Tunnel'
        run: |
          # Download and install zrok
          curl -sSfL https://get.openziti.io/zrok/install.sh | sh
          sudo mv zrok /usr/local/bin/

          # Enable zrok environment (replace with your token from zrok.io)
          zrok enable ahHD9lCRm1Qj --headless

          # Start the zrok tunnel and capture the share token
          echo "Starting zrok tunnel..."
          zrok share private --headless --backend-mode tcpTunnel localhost:5900 &
          sleep 10

      - name: 'Keep workflow alive'
        run: |
          echo "=============================================="
          echo "✅ Your macOS environment is ready!"
          echo "🔗 To connect from Windows, open a new PowerShell terminal and run:"
          echo "   zrok access private ${{ env.ZROK_TOKEN }} --bind 127.0.0.1:5901"
          echo "🔑 VNC Password: vncpassword"
          echo "👤 Username: runneradmin"
          echo "=============================================="
          echo "⚠️  This session will stay alive for up to 6 hours."
          echo "=============================================="
          sleep 6h
